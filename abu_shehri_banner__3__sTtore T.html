<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Abu Shehri Live Banner — Xabushehri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:        #0A0906;
    --gold:       #D9A94B;
    --gold-light: #F3D98A;
    --gold-dark:  #8A6A22;
    --paper:      #F6F1E7;
    --muted:      #9C9280;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    width:100%; height:100%;
    background:transparent;
    overflow:hidden;
    font-family:'Tajawal', sans-serif;
  }

  .stage{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .strip{
    position:relative;
    width:min(1360px, 95vw);
    height:150px;
    background:
      radial-gradient(120% 180% at 15% 0%, rgba(217,169,75,0.10) 0%, transparent 55%),
      linear-gradient(180deg, rgba(12,10,7,0.94) 0%, rgba(8,7,5,0.94) 100%);
    border:1px solid rgba(217,169,75,0.28);
    border-radius:26px;
    display:flex;
    align-items:center;
    overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .hairline{
    position:absolute;
    top:0; left:0; right:0;
    height:2px;
    background:linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent 100%);
    opacity:0.85;
  }

  .content{
    flex:1 1 auto;
    display:flex;
    align-items:center;
    height:100%;
    padding:0 20px;
    min-width:0;
  }

  .mark{
    position:relative;
    flex:0 0 auto;
    width:104px;
    height:104px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-inline-start:18px;
  }
  .mark::before{
    content:"";
    position:absolute;
    width:98px; height:98px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(217,169,75,0.38) 0%, rgba(217,169,75,0) 72%);
    animation:pulse 2.6s ease-in-out infinite;
  }
  .logo-img{
    width:88px; height:88px;
    border-radius:50%;
    object-fit:cover;
    object-position:center 15%;
    border:3px solid var(--gold);
    box-shadow:0 0 16px rgba(217,169,75,0.5), inset 0 0 0 3px rgba(0,0,0,0.4);
    position:relative;
    z-index:1;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(0.88); opacity:0.5; }
    50%{ transform:scale(1.1); opacity:1; }
  }

  .divider{
    flex:0 0 auto;
    width:1px;
    height:64px;
    margin:0 26px;
    background:linear-gradient(180deg, transparent, rgba(217,169,75,0.45), transparent);
  }

  .text-zone{
    flex:1 1 auto;
    min-width:0;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  .greeting{
    font-family:'Tajawal', sans-serif;
    font-weight:900;
    font-size:clamp(24px, 3vw, 36px);
    color:var(--paper);
    letter-spacing:0.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  .greeting b{
    color:var(--gold-light);
    font-weight:900;
  }
  .kick-logo{
    display:inline-block;
    vertical-align:middle;
    height:1.15em;
    width:auto;
    margin-inline-start:12px;
    transform:translateY(-3px);
    filter:drop-shadow(0 0 6px rgba(83,252,24,0.55));
  }
  .greeting.fade{
    opacity:0;
    transform:translateY(8px);
  }

  .underline{
    height:3px;
    width:0%;
    border-radius:3px;
    background:linear-gradient(90deg, var(--gold), var(--gold-light));
    box-shadow:0 0 8px rgba(217,169,75,0.6);
    transition:width 0.9s cubic-bezier(0.22,0.9,0.3,1);
  }
  .underline.grow{ width:64%; }

  .handle{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:4px;
    padding-inline-end:8px;
    margin-inline-start:auto;
  }
  .handle .top{
    display:flex;
    align-items:center;
    gap:7px;
  }
  .handle .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 8px rgba(217,169,75,0.9);
    animation:blink 1.6s ease-in-out infinite;
  }
  .handle .live{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.16em;
    color:var(--gold-light);
  }
  .handle .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--paper);
    direction:ltr;
  }
  .handle .sub{
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:12.5px;
    color:var(--muted);
    direction:ltr;
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:0.25; }
  }

  .sweep{
    position:absolute;
    top:0; bottom:0;
    width:160px;
    background:linear-gradient(90deg, transparent, rgba(217,169,75,0.09), transparent);
    animation:sweep 7s ease-in-out infinite;
    z-index:2;
    pointer-events:none;
  }
  @keyframes sweep{
    0%{ left:-180px; }
    50%{ left:110%; }
    100%{ left:110%; }
  }

  @media (prefers-reduced-motion: reduce){
    .sweep, .mark::before, .handle .dot{ animation:none !important; }
    .greeting, .underline{ transition:none !important; }
  }
</style>
</head>
